# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

format = """
[в•ӯп‘ӣоӮ¶](purple)\
$os\
$username\
[оӮҙ](fg:purple bg:mauve)\
$directory\
[оӮҙ](fg:mauve)\
$lua\
$python\
$java\
$c\
$cpp\
$nodejs\
$rust\
$cmd_duration
[в•°п“« ](fg:purple)$character\
"""

right_format = """
$git_branch\
$git_status\
$package\
$time\
"""

palette = 'catppuccin_tokyonight'

command_timeout = 1000

# Inserts a blank line between shell prompts
add_newline = true

[character]
success_symbol = '[п„Ғ](bold green)'
error_symbol = '[п„Ғ](bold red)'
vimcmd_symbol = "[в– ](italic dimmed green)"

[os]
disabled = false
format = '[$symbol ]($style)'
style = 'bg:purple fg:crust'

[username]
disabled = false
format = '[$user]($style)'
style_user = 'bold bg:purple fg:crust'
show_always = true

[time]
disabled = false
time_format = "пү‘ %I:%M"
format = '[ $time]($style) '
utc_time_offset = "local"
use_12hr = true
style = 'italic bold dimmed lavender'

[directory]
format = "[$path]($style)"
repo_root_format = '[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style)'
style = "fg:crust bg:mauve"
repo_root_style = "fg:crust bg:mauve bold italic"
read_only = " пҖЈ "
home_symbol = ' у°ңҘ '
use_os_path_sep = true
truncation_length = 3
truncation_symbol = " п“« /"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
"Developer" = "п„Ў "

[cmd_duration]
show_milliseconds = true
format = "[ ој– $duration ]($style)"
style = "bold yellow"
disabled = false
show_notifications = true
min_time_to_notify = 35000

[git_branch]
symbol = "оӮ "
style = "bold italic blue6"
format = "[ $symbol $branch ]($style)"

[git_status]
format = "([вҺӘ$modified$untracked$staged$deleted$ahead_behind$renamed$stashed вҺӘ]($style))"
style = "dimmed lavender"
ahead = "[ п„Ӯ ${count}](bold pink)"
behind = "[ п„ғ ${count}](bold pink)"
modified = "[ пҒ„ ($count)](bold green)"
untracked = "[ у°ё¶ ($count)](bold orange)"
staged = "[ у°ҚҢ ($count)](bold blue5)"
renamed = "[ [вҺӘ](dimmed lavender) пғ¬ ($count)](bold sapphire)"
stashed = '[ п”һ ($count)](bold sky)'
deleted = "[ п“ҙ ($count)](bold magenta)"
typechanged = ""
disabled = false
ignore_submodules = false

[git_metrics]
added_style = "bold green"
deleted_style = "bold red"
ignore_submodules = false
disabled = true
format = "([пғҫ $added]($added_style) )([п…Ҷ $deleted]($deleted_style) )"

[package]
format = "[ у°Ҹ“ $version]($style) "
style = "bold peach"

[conda]
format = '[$symbol$environment ]($style)'
symbol = " п„Ң "
style = ""
ignore_base = false

[python]
format = '[ ([$symbol $version](bold cyan))( \(у°ҢӘ $virtualenv\))]($style)'
symbol = "оҳҶ"
style = "bold italic tokyo_green"

[golang]
format = "[ $symbol ([$version](bold cyan))]($style)"
symbol = "оҳ§"
style = "bold italic cyan"

[java]
format = '[ $symbol ([$version](bold orange))]($style)'
symbol = "оү–"
version_format = "v${raw}"
style = "bold italic orange"

[nodejs]
format = '[ $symbol ([$version](bold tokyo_green))]($style)'
symbol = "оҙҚ"
style = "bold italic tokyo_green"

[c]
format = '[ $symbol $name [($version)](bold blue5)]($style)'
symbol = "оҷү"
style = "bold italic blue5"

[cpp]
format = '[ $symbol $name [($version)](bold blue5)]($style)'
symbol = "оҷҶ"
style = "bold italic blue5"

[rust]
format = '[ $symbol [($version)](bold tokyo_red)( \($toolchain\))]($style)'
symbol = "оҡӢ"
style = "bold italic tokyo_red"

[lua]
format = '[ $symbol ($version)]($style)'
symbol = "оҳ "
version_format = "v${raw}"
style = "bold blue2"

